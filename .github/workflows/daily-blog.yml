name: Daily Blog Generator

on:
  schedule:
    - cron: '0 10 * * *' # Todos os dias às 10:00 UTC
  workflow_dispatch: # Permite execução manual

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: docs/scripts
        run: npm install

      - name: Generate Post
        working-directory: docs/scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node gerar-post.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/blog.html docs/blog/
          git commit -m "chore(blog): generate daily post via Gemini API" || echo "No changes to commit"
          git push
